name: Deploy to GitHub Pages

# Publishes the static dashboard to GitHub Pages.
#
# ONE-TIME SETUP (required before the first deploy):
#   Repo Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
# After that, every push to `main` deploys automatically. You can also run it
# on demand from the Actions tab via "Run workflow".
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
